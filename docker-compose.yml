services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shorter}
      POSTGRES_USER: ${POSTGRES_USER:-shorter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shorter}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: ${POSTGRES_MEM_LIMIT:-512m}
    cpus: ${POSTGRES_CPUS:-1.0}
    pids_limit: ${POSTGRES_PIDS_LIMIT:-256}

  migrate:
    image: ${DOCKERHUB_USER:-local}/shorter-migrate:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${MIGRATE_MEM_LIMIT:-128m}
    cpus: ${MIGRATE_CPUS:-0.5}
    pids_limit: ${MIGRATE_PIDS_LIMIT:-128}

  backend:
    image: ${DOCKERHUB_USER:-local}/shorter-backend:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    env_file:
      - path: .env
        required: false
    environment:
      BACKEND_HTTP_ADDR: ${BACKEND_HTTP_ADDR:-:8080}
    expose:
      - "8080"
    ports:
      - "127.0.0.1:${BACKEND_HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${BACKEND_MEM_LIMIT:-128m}
    cpus: ${BACKEND_CPUS:-0.5}
    pids_limit: ${BACKEND_PIDS_LIMIT:-128}

  bot:
    image: ${DOCKERHUB_USER:-local}/shorter-bot:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${BOT_MEM_LIMIT:-128m}
    cpus: ${BOT_CPUS:-0.5}
    pids_limit: ${BOT_PIDS_LIMIT:-128}

volumes:
  postgres_data:
